# slf4j-simple configuration (this is what's actually used — logback.xml is ignored)
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss
org.slf4j.simpleLogger.showThreadName=true
org.slf4j.simpleLogger.showLogName=true

# Enable DEBUG for JDA voice internals to diagnose the join/leave loop
org.slf4j.simpleLogger.log.net.dv8tion.jda.internal.audio=debug
org.slf4j.simpleLogger.log.net.dv8tion.jda.internal.managers.AudioManagerImpl=debug
